# fi-based template backend — conda-native (no PyPI-only; matches the fi-* stack).
name: app
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.12
  - nodejs>=22,<23          # for the npm CLIs: claude-code, codex (+ any MCP)
  - pip
  - pip:
      # fi-runner + fi-core live in the free-intelligence monorepo (MIT). Neither
      # is on PyPI, so install both from git. fi-core MUST come before fi-runner
      # (pip resolves fi-runner's fi-core dep from this explicit URL).
      #
      # PIN FOR DEPLOY: `@dev` is a MOVING branch — fine for local dev, but for a
      # reproducible image pin a tag or SHA (or switch to @main once your needed
      # changes land there). A moving branch means two builds of the same commit
      # can differ.
      #
      # RAG store backends — both extras ship so a switch between
      # FI_RAG_BACKEND=hdf5 (local dev / single-process) and =pgvector (deploy /
      # multi-replica) is just an env var, no rebuild.
      #   - [stores-hdf5]:     h5py + numpy — single-file persistent backend.
      #   - [stores-pgvector]: asyncpg + pgvector — Postgres backend with
      #                        concurrent writers. The deploy path.
      - "fi-core[stores-hdf5,stores-pgvector] @ git+https://github.com/BernardUriza/free-intelligence.git@dev#subdirectory=apps/packages/fi-core"
      # [claude,codex]: both backends install clean — parity as the doctrine wants.
      - "fi-runner[claude,codex] @ git+https://github.com/BernardUriza/free-intelligence.git@dev#subdirectory=apps/packages/fi-runner"
      - fastapi
      - "uvicorn[standard]"
      # Per-IP rate limiting on /chat/stream. A public Container App URL is a
      # money funnel for any bot that finds it — slowapi is the cheap floor;
      # the X-API-Key check sits ON TOP.
      - "slowapi>=0.1.9"
